<!DOCTYPE html>
<html>
<head>
    <title>Testimonial Section</title>
    <style>
        /* Main Container */
        .testimonial-section {
            background-color: #f5f5f5;
            padding: 40px;
            width: 60%;
            margin: auto;
        }

        /* Individual Testimonial Box */
        .testimonial {
            background-color: #ffffff;
            padding: 20px;
            border: 1px solid #cccccc;
            margin-bottom: 20px;
        }

        /* Testimonial Text */
        .testimonial p {
            margin: 0 0 10px 0;
        }

        /* Author Name */
        .author {
            text-align: right;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="testimonial-section">
        
        <div class="testimonial">
            <p>
                This product has completely changed my workflow. The quality and support are outstanding!
            </p>
            <div class="author">- John Doe</div>
        </div>

        <div class="testimonial">
            <p>
                I highly recommend this service to anyone looking for reliability and excellent customer experience.
            </p>
            <div class="author">- Jane Smith</div>
        </div>

    </div>

</body>
</html>
